# Judge0 CE — Self-hosted code execution engine
# Run: docker-compose up -d
# Access: http://localhost:2358
# Docs: https://github.com/judge0/judge0

version: "3.9"

services:

  server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:13.0
    environment:
      POSTGRES_PASSWORD: "judge0"
      POSTGRES_DB:       "judge0"
    restart: always
    volumes:
      - judge0-db:/var/lib/postgresql/data

  redis:
    image: redis:6.0
    restart: always
    volumes:
      - judge0-redis:/data

volumes:
  judge0-db:
  judge0-redis:
