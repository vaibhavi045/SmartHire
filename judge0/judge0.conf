# Judge0 CE Configuration
# Full docs: https://github.com/judge0/judge0/blob/master/judge0.conf

################################################################################
# JUDGE0 SERVER
################################################################################
RAILS_ENV=production
RACK_ENV=production
RAILS_LOG_TO_STDOUT=true

# Server port (must match docker-compose.yml)
PORT=2358

################################################################################
# DATABASE
################################################################################
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=postgres
POSTGRES_PASSWORD=judge0

################################################################################
# REDIS
################################################################################
REDIS_HOST=redis
REDIS_PORT=6379

################################################################################
# WORKERS
################################################################################
COUNT_OF_WORKERS=3

################################################################################
# SANDBOX SECURITY
# Enable isolation for production, disable for local dev
################################################################################
USE_SANDBOX=false

################################################################################
# TIMEOUTS (milliseconds)
################################################################################
CPU_TIME_LIMIT=5
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MEMORY_LIMIT=256000
STACK_LIMIT=64000
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false
MAX_FILE_SIZE=1024
NUMBER_OF_RUNS=1

################################################################################
# API SETTINGS
# Disable auth tokens for local development
################################################################################
AUTHN_TOKEN=
AUTHZ_TOKEN=
